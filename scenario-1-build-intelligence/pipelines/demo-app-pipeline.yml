# =============================================================================
# Demo App Pipeline — AI DevSecOps Showcase
# =============================================================================
#
# Purpose:
#   Simulates a realistic microservice CI/CD pipeline that intentionally
#   produces a variety of failure patterns. These failures are used as input
#   data for the AI Build Intelligence agent (Scenario 1), which mines
#   patterns, performs GPT root-cause analysis, and publishes a remediation
#   wiki page.
#
# Failure scenarios seeded:
#   1. Unit tests  — pytest discovers import errors after a dependency bump
#   2. Integration — database connectivity fails (PostgreSQL not available)
#   3. Lint        — code style violations block the pipeline
#   4. Docker      — base image tag no longer exists in registry
#   5. Secrets     — missing environment variable causes startup crash
#
# Trigger: manual only (Queue via ADO UI or API to seed failure data)
# =============================================================================

trigger: none

parameters:
  - name: failureScenario
    displayName: "Failure scenario to simulate"
    type: string
    default: "all"
    values:
      - all
      - unit-tests
      - integration
      - lint
      - docker
      - secrets

variables:
  APP_NAME: "orders-service"
  BUILD_ID: $(Build.BuildId)
  BRANCH: $(Build.SourceBranchName)

pool:
  vmImage: ubuntu-latest

stages:

  # ---------------------------------------------------------------------------
  # Stage 1 — Build & Unit Tests
  # ---------------------------------------------------------------------------
  - stage: Build
    displayName: "Build & Unit Tests"
    jobs:
      - job: UnitTests
        displayName: "Install dependencies & run unit tests"
        timeoutInMinutes: 10
        steps:

          - script: |
              echo "##[section]Setting up Python environment for $(APP_NAME)"
              python3 -m pip install --upgrade pip
              echo "##[section]Installing pinned requirements..."
              # Simulate a dependency conflict introduced by a recent version bump
              pip install "requests==2.28.0" "urllib3==2.0.0" 2>&1
              EXIT_CODE=$?
              if [ $EXIT_CODE -ne 0 ]; then
                echo "##[error]Dependency resolution failed: urllib3 v2.x is incompatible with requests==2.28.0."
                echo "##[error]Error: Cannot install requests==2.28.0 and urllib3>=2.0.0 because these package versions have conflicting dependencies."
                echo "##[error]The conflict is caused by: requests 2.28.0 depends on urllib3<2 and >=1.21.1"
                exit 1
              fi
            displayName: "Install Python dependencies"
            condition: |
              or(
                eq('${{ parameters.failureScenario }}', 'all'),
                eq('${{ parameters.failureScenario }}', 'unit-tests')
              )

          - script: |
              echo "##[section]Running unit test suite..."
              python3 -c "
import sys
# Simulate import error caused by incompatible package version
print('Collecting tests...')
print('ERROR: ImportError while importing test module orders_service/tests/test_payment.py')
print('ImportError: cannot import name \"JSONDecodeError\" from \"requests.exceptions\"')
print('(check your installed packages: requests==2.28.0 conflicts with urllib3==2.0.0)')
print('')
print('FAILED — 0 tests collected, 1 error')
sys.exit(1)
"
            displayName: "Run pytest — orders-service"
            condition: |
              or(
                eq('${{ parameters.failureScenario }}', 'all'),
                eq('${{ parameters.failureScenario }}', 'unit-tests')
              )

  # ---------------------------------------------------------------------------
  # Stage 2 — Integration Tests
  # ---------------------------------------------------------------------------
  - stage: Integration
    displayName: "Integration Tests"
    dependsOn: []   # Run independently so failures accumulate across stages
    jobs:
      - job: IntegrationTests
        displayName: "Run integration tests against PostgreSQL"
        timeoutInMinutes: 15
        steps:

          - script: |
              echo "##[section]Waiting for PostgreSQL to be ready..."
              # Simulate database not being available (no service container configured)
              for i in 1 2 3; do
                echo "Attempt $i: connecting to postgres://orders-db:5432/ordersdb ..."
                sleep 1
              done
              echo "##[error]Connection refused: could not connect to server: Connection refused"
              echo "##[error]  Is the server running on host \"orders-db\" (172.17.0.5) and accepting"
              echo "##[error]  TCP/IP connections on port 5432?"
              echo "##[error]psycopg2.OperationalError: connection to server at \"orders-db\" (172.17.0.5), port 5432 failed: Connection refused"
              exit 1
            displayName: "Wait for PostgreSQL & run DB migrations"
            condition: |
              or(
                eq('${{ parameters.failureScenario }}', 'all'),
                eq('${{ parameters.failureScenario }}', 'integration')
              )

  # ---------------------------------------------------------------------------
  # Stage 3 — Code Quality
  # ---------------------------------------------------------------------------
  - stage: CodeQuality
    displayName: "Code Quality & Lint"
    dependsOn: []
    jobs:
      - job: Lint
        displayName: "Flake8 lint & Black formatting check"
        timeoutInMinutes: 5
        steps:

          - script: |
              pip install flake8 black 2>&1 | tail -1
            displayName: "Install linting tools"

          - script: |
              echo "##[section]Running flake8 on orders_service/..."
              # Simulate lint violations
              python3 -c "
violations = [
  'orders_service/handlers/checkout.py:45:1: E302 expected 2 blank lines, found 1',
  'orders_service/handlers/checkout.py:78:80: E501 line too long (112 > 79 characters)',
  'orders_service/models/order.py:12:1: F401 \"uuid\" imported but unused',
  'orders_service/models/order.py:33:5: E711 comparison to None (use \"is\" or \"is not\")',
  'orders_service/services/payment.py:91:1: E302 expected 2 blank lines, found 1',
  'orders_service/services/payment.py:104:13: W503 line break before binary operator',
]
for v in violations:
    print(v)
print(f'')
print(f'flake8: {len(violations)} violation(s) found.')
import sys; sys.exit(1)
"
            displayName: "Run flake8"
            condition: |
              or(
                eq('${{ parameters.failureScenario }}', 'all'),
                eq('${{ parameters.failureScenario }}', 'lint')
              )

          - script: |
              echo "##[section]Checking Black formatting..."
              python3 -c "
files = [
  'orders_service/handlers/checkout.py',
  'orders_service/services/payment.py',
]
print('would reformat ' + chr(10).join(files))
print('Oh no! 2 files would be reformatted.')
print('Run Black with --check to see differences.')
import sys; sys.exit(1)
"
            displayName: "Run Black --check"
            condition: |
              or(
                eq('${{ parameters.failureScenario }}', 'all'),
                eq('${{ parameters.failureScenario }}', 'lint')
              )

  # ---------------------------------------------------------------------------
  # Stage 4 — Docker Build
  # ---------------------------------------------------------------------------
  - stage: Docker
    displayName: "Docker Build & Push"
    dependsOn: []
    jobs:
      - job: DockerBuild
        displayName: "Build and push container image"
        timeoutInMinutes: 15
        steps:

          - script: |
              echo "##[section]Building Docker image: $(APP_NAME):$(BUILD_ID)"
              # Simulate Docker build failure due to invalid base image tag
              python3 -c "
import sys
print('Sending build context to Docker daemon  4.21MB')
print('Step 1/12 : FROM python:3.11.2-slim-bullseye')
print('3.11.2-slim-bullseye: Pulling from library/python')
print('manifest unknown: manifest unknown')
print('##[error]Error response from daemon: manifest for python:3.11.2-slim-bullseye not found: manifest unknown: manifest unknown')
print('##[error]Error: failed to solve: failed to read dockerfile: failed to pull image \"python:3.11.2-slim-bullseye\": error getting credentials - err: exec: \"docker-credential-desktop.exe\": executable file not found in \$PATH, out: \`\`')
sys.exit(1)
"
            displayName: "docker build $(APP_NAME)"
            condition: |
              or(
                eq('${{ parameters.failureScenario }}', 'all'),
                eq('${{ parameters.failureScenario }}', 'docker')
              )

  # ---------------------------------------------------------------------------
  # Stage 5 — Deploy (Smoke Test)
  # ---------------------------------------------------------------------------
  - stage: Deploy
    displayName: "Deploy to Staging"
    dependsOn: []
    jobs:
      - job: DeployStaging
        displayName: "Deploy $(APP_NAME) to staging environment"
        timeoutInMinutes: 10
        steps:

          - script: |
              echo "##[section]Deploying $(APP_NAME) to staging..."
              echo "Checking required environment variables..."
              python3 -c "
import sys, os
required = ['DATABASE_URL', 'JWT_SECRET_KEY', 'STRIPE_API_KEY', 'REDIS_URL']
missing = [v for v in required if not os.environ.get(v)]
if missing:
    for v in missing:
        print(f'##[error]KeyError: Required environment variable \"{v}\" is not set.')
    print('')
    print(f'##[error]Application startup failed: {len(missing)} required environment variable(s) missing.')
    print('##[error]Set the missing variables in the pipeline variable group or Key Vault link.')
    print('Hint: Add DATABASE_URL, JWT_SECRET_KEY, STRIPE_API_KEY, REDIS_URL to the variable group.')
    sys.exit(1)
print('All environment variables present. Starting application...')
"
            displayName: "Validate env vars & start app"
            condition: |
              or(
                eq('${{ parameters.failureScenario }}', 'all'),
                eq('${{ parameters.failureScenario }}', 'secrets')
              )
