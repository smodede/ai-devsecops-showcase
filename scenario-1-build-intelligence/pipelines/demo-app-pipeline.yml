# =============================================================================
# Demo App Pipeline - AI DevSecOps Showcase
# =============================================================================
#
# Purpose:
#   Simulates a realistic microservice CI/CD pipeline that intentionally
#   produces a variety of failure patterns. These failures are used as input
#   data for the AI Build Intelligence agent (Scenario 1), which mines
#   patterns, performs GPT root-cause analysis, and publishes a remediation
#   wiki page.
#
# Failure scenarios seeded:
#   1. Unit tests  - pytest discovers import errors after a dependency bump
#   2. Integration - database connectivity fails (PostgreSQL not available)
#   3. Lint        - code style violations block the pipeline
#   4. Docker      - base image tag no longer exists in registry
#   5. Secrets     - missing environment variable causes startup crash
#
# Trigger: manual only (Queue via ADO UI or API to seed failure data)
# =============================================================================

trigger: none

parameters:
  - name: failureScenario
    displayName: "Failure scenario to simulate"
    type: string
    default: "all"
    values:
      - all
      - unit-tests
      - integration
      - lint
      - docker
      - secrets

variables:
  app_name: "orders-service"

pool:
  vmImage: ubuntu-latest

stages:

  # ---------------------------------------------------------------------------
  # Stage 1 - Build & Unit Tests
  # ---------------------------------------------------------------------------
  - stage: Build
    displayName: "Build and Unit Tests"
    condition: >
      or(
        eq('${{ parameters.failureScenario }}', 'all'),
        eq('${{ parameters.failureScenario }}', 'unit-tests')
      )
    jobs:
      - job: UnitTests
        displayName: "Install dependencies and run unit tests"
        timeoutInMinutes: 10
        steps:

          - script: |
              echo "##[section]Setting up Python environment for orders-service"
              python3 -m pip install --upgrade pip
              echo "##[section]Installing pinned requirements"
              echo "##[error]Dependency resolution failed: urllib3 v2.x is incompatible with requests==2.28.0."
              echo "##[error]Error: Cannot install requests==2.28.0 and urllib3>=2.0.0 because these package versions have conflicting dependencies."
              echo "##[error]The conflict is caused by: requests 2.28.0 depends on urllib3<2 and >=1.21.1"
              exit 1
            displayName: "Install Python dependencies"

          - script: |
              echo "##[section]Running unit test suite"
              echo "Collecting tests..."
              echo "ERROR: ImportError while importing test module orders_service/tests/test_payment.py"
              echo "ImportError: cannot import name JSONDecodeError from requests.exceptions"
              echo "check your installed packages: requests==2.28.0 conflicts with urllib3==2.0.0"
              echo "FAILED - 0 tests collected, 1 error"
              exit 1
            displayName: "Run pytest orders-service"

  # ---------------------------------------------------------------------------
  # Stage 2 - Integration Tests
  # ---------------------------------------------------------------------------
  - stage: Integration
    displayName: "Integration Tests"
    dependsOn: []
    condition: >
      or(
        eq('${{ parameters.failureScenario }}', 'all'),
        eq('${{ parameters.failureScenario }}', 'integration')
      )
    jobs:
      - job: IntegrationTests
        displayName: "Run integration tests against PostgreSQL"
        timeoutInMinutes: 15
        steps:

          - script: |
              echo "##[section]Waiting for PostgreSQL to be ready"
              for i in 1 2 3; do
                echo "Attempt $i: connecting to postgres://orders-db:5432/ordersdb ..."
                sleep 1
              done
              echo "##[error]Connection refused: could not connect to server: Connection refused"
              echo "##[error]Is the server running on host orders-db (172.17.0.5) and accepting TCP/IP connections on port 5432?"
              echo "##[error]psycopg2.OperationalError: connection to server at orders-db port 5432 failed: Connection refused"
              exit 1
            displayName: "Wait for PostgreSQL and run DB migrations"

  # ---------------------------------------------------------------------------
  # Stage 3 - Code Quality
  # ---------------------------------------------------------------------------
  - stage: CodeQuality
    displayName: "Code Quality and Lint"
    dependsOn: []
    condition: >
      or(
        eq('${{ parameters.failureScenario }}', 'all'),
        eq('${{ parameters.failureScenario }}', 'lint')
      )
    jobs:
      - job: Lint
        displayName: "Flake8 lint and Black formatting check"
        timeoutInMinutes: 5
        steps:

          - script: pip install flake8 black 2>&1 | tail -1
            displayName: "Install linting tools"

          - script: |
              echo "##[section]Running flake8 on orders_service"
              echo "orders_service/handlers/checkout.py:45:1: E302 expected 2 blank lines, found 1"
              echo "orders_service/handlers/checkout.py:78:80: E501 line too long (112 > 79 characters)"
              echo "orders_service/models/order.py:12:1: F401 uuid imported but unused"
              echo "orders_service/models/order.py:33:5: E711 comparison to None (use is or is not)"
              echo "orders_service/services/payment.py:91:1: E302 expected 2 blank lines, found 1"
              echo "orders_service/services/payment.py:104:13: W503 line break before binary operator"
              echo "##[error]flake8: 6 violation(s) found. Fix all E/F/W errors before merging."
              exit 1
            displayName: "Run flake8"

          - script: |
              echo "##[section]Checking Black formatting"
              echo "would reformat orders_service/handlers/checkout.py"
              echo "would reformat orders_service/services/payment.py"
              echo "##[error]Oh no! 2 files would be reformatted. Run: black orders_service/ to fix."
              exit 1
            displayName: "Run Black formatting check"

  # ---------------------------------------------------------------------------
  # Stage 4 - Docker Build
  # ---------------------------------------------------------------------------
  - stage: Docker
    displayName: "Docker Build and Push"
    dependsOn: []
    condition: >
      or(
        eq('${{ parameters.failureScenario }}', 'all'),
        eq('${{ parameters.failureScenario }}', 'docker')
      )
    jobs:
      - job: DockerBuild
        displayName: "Build and push container image"
        timeoutInMinutes: 15
        steps:

          - script: |
              echo "##[section]Building Docker image: orders-service:$(Build.BuildId)"
              echo "Sending build context to Docker daemon  4.21MB"
              echo "Step 1/12 : FROM python:3.11.2-slim-bullseye"
              echo "3.11.2-slim-bullseye: Pulling from library/python"
              echo "manifest unknown: manifest unknown"
              echo "##[error]Error response from daemon: manifest for python:3.11.2-slim-bullseye not found: manifest unknown"
              echo "##[error]The base image python:3.11.2-slim-bullseye does not exist. Update the FROM tag to a valid release (e.g. python:3.11-slim)."
              exit 1
            displayName: "docker build orders-service"

  # ---------------------------------------------------------------------------
  # Stage 5 - Deploy (Smoke Test)
  # ---------------------------------------------------------------------------
  - stage: Deploy
    displayName: "Deploy to Staging"
    dependsOn: []
    condition: >
      or(
        eq('${{ parameters.failureScenario }}', 'all'),
        eq('${{ parameters.failureScenario }}', 'secrets')
      )
    jobs:
      - job: DeployStaging
        displayName: "Deploy orders-service to staging environment"
        timeoutInMinutes: 10
        steps:

          - script: |
              echo "##[section]Deploying orders-service to staging"
              echo "Checking required environment variables..."
              echo "##[error]KeyError: Required environment variable DATABASE_URL is not set."
              echo "##[error]KeyError: Required environment variable JWT_SECRET_KEY is not set."
              echo "##[error]KeyError: Required environment variable STRIPE_API_KEY is not set."
              echo "##[error]KeyError: Required environment variable REDIS_URL is not set."
              echo "##[error]Application startup failed: 4 required environment variable(s) missing."
              echo "##[error]Add DATABASE_URL, JWT_SECRET_KEY, STRIPE_API_KEY, REDIS_URL to the pipeline variable group."
              exit 1
            displayName: "Validate env vars and start app"
